name: Tests Workflows 

on:
  push:
    branches: [main]
  pull_request:         # Ajouté pour le feedback de Guillaume
    branches: [main]
  workflow_dispatch:

jobs:
  # --- LASSANA ---
  lassana-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # On précise où est le fichier lock pour le cache
          cache-dependency-path: './Two_Ships_Passing_In_The_Night/package-lock.json'
      
      - name: Install & Lint
        working-directory: ./Two_Ships_Passing_In_The_Night
        run: |
          npm ci
          npx eslint . --format stylish || true
          
      - name: Mocha Tests
        working-directory: ./Two_Ships_Passing_In_The_Night
        run: npx mocha --require ./setup.js --reporter mocha-github-actions-reporter || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- MATRAMI ---
  matrami-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Space_Invaders/package-lock.json'
          
      - name: Install & Build Parcel
        working-directory: ./Space_Invaders
        run: |
          npm ci
          npm run lint || true
          npm test || true

  # --- DÉPLOIEMENT DOCKER FUSIONNÉ ---
  deploy-docker:
    needs: [lassana-jobs, matrami-jobs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      # IMPORTANT : Si ton Dockerfile a besoin des dossiers build de chaque jeu, 
      # il faut les re-générer ici ou utiliser des "artifacts". 
      # Pour faire simple, on rebuild rapidement avant le docker build :
      - name: Build All Games
        run: |
          cd Space_Invaders && npm ci && npm run build --if-present
          cd ../Two_Ships_Passing_In_The_Night && npm ci && npm run build --if-present

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and Push
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          docker build -t $IMAGE_ID:latest .
          docker push $IMAGE_ID:latest