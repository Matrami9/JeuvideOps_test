name: Tests Workflows 

on:
  push:
    branches: [main]
  pull_request:         
    branches: [main]
  workflow_dispatch:

jobs:
  # --- LASSANA ---
  lassana-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Two_Ships_Passing_In_The_Night/package-lock.json'
      
      - name: Install & Lint
        working-directory: ./Two_Ships_Passing_In_The_Night
        run: |
          npm ci
          npx eslint . --format stylish || true
          
      - name: Mocha Tests
        working-directory: ./Two_Ships_Passing_In_The_Night
        run: npx mocha --require ./setup.js --reporter mocha-github-actions-reporter || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- MATRAMI ---
  matrami-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Space_Invaders/package-lock.json'
          
      - name: Install & Build
        working-directory: ./Space_Invaders
        run: |
          npm ci
          # On teste deux chemins possibles pour index.html pour éviter l'erreur "No entries found"
          if [ -f "./src/index.html" ]; then
            npx parcel build ./src/index.html -d build --public-url ./ --no-source-maps
          else
            npx parcel build index.html -d build --public-url ./ --no-source-maps
          fi

      - name: Tests & Summary
        working-directory: ./Space_Invaders
        run: |
          npm test || true
          echo "### 🚀 Résumé Space Invaders" >> $GITHUB_STEP_SUMMARY
          echo "* Build : OK ✅" >> $GITHUB_STEP_SUMMARY
          echo "* Tests : Terminés ✅" >> $GITHUB_STEP_SUMMARY

  # --- DÉPLOIEMENT DOCKER FUSIONNÉ ---
  deploy-docker:
    needs: [lassana-jobs, matrami-jobs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Build All Games for Docker
        run: |
          cd Space_Invaders && npm ci && (npx parcel build ./src/index.html -d build --public-url ./ --no-source-maps || npx parcel build index.html -d build --public-url ./ --no-source-maps)
          cd ../Two_Ships_Passing_In_The_Night && npm ci && npm run build --if-present

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and Push
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          docker build -t $IMAGE_ID:latest .
          docker push $IMAGE_ID:latest